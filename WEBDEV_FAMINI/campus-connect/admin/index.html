<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel — Campus Connect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="admin.css"/>
</head>
<body>

  <!-- ── SIDEBAR ───────────────────────────────── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">CC</div>
      <div>
        <div class="logo-title">CampusConnect</div>
        <div class="logo-sub">Admin Panel</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a href="#" class="nav-item active" data-section="dashboard">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
        Dashboard
      </a>
      <a href="#" class="nav-item" data-section="events">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        Events
      </a>
      <a href="#" class="nav-item" data-section="contacts">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/>
        </svg>
        Contacts
      </a>
    </nav>

    <a href="../index.html" class="back-btn" target="_blank">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
      </svg>
      Back to Website
    </a>
  </aside>

  <!-- ── MAIN CONTENT ──────────────────────────── -->
  <main class="main-content">

    <!-- Top Bar -->
    <header class="topbar">
      <button class="sidebar-toggle" id="sidebar-toggle">
        <span></span><span></span><span></span>
      </button>
      <div class="topbar-title" id="topbar-title">Dashboard</div>
      <div class="topbar-badge">Admin</div>
    </header>

    <!-- ══ DASHBOARD ══ -->
    <section class="section active" id="section-dashboard">
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-icon events-icon">
            <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <rect x="3" y="4" width="18" height="18" rx="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
          </div>
          <div class="stat-info">
            <div class="stat-num" id="stat-events">0</div>
            <div class="stat-label">Total Events</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon contacts-icon">
            <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
            </svg>
          </div>
          <div class="stat-info">
            <div class="stat-num" id="stat-contacts">0</div>
            <div class="stat-label">Program Heads</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon programs-icon">
            <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
              <path d="M6 12v5c3 3 9 3 12 0v-5"/>
            </svg>
          </div>
          <div class="stat-info">
            <div class="stat-num" id="stat-programs">5</div>
            <div class="stat-label">Active Programs</div>
          </div>
        </div>
      </div>

      <div class="quick-actions">
        <h2 class="section-title">Quick Actions</h2>
        <div class="qa-grid">
          <button class="qa-card" data-goto="events">
            <div class="qa-icon">📅</div>
            <h3>Manage Events</h3>
            <p>Add, edit, or delete campus events</p>
          </button>
          <button class="qa-card" data-goto="contacts">
            <div class="qa-icon">👥</div>
            <h3>Manage Contacts</h3>
            <p>Update program head information</p>
          </button>
        </div>
      </div>

      <div class="recent-box">
        <h2 class="section-title">Recent Events</h2>
        <div id="dashboard-events-list"></div>
      </div>
    </section>

    <!-- ══ EVENTS ══ -->
    <section class="section" id="section-events">
      <div class="section-header-row">
        <h2 class="section-title">Manage Events</h2>
        <button class="btn-add" id="btn-add-event">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Add Event
        </button>
      </div>
      <div class="admin-table-wrap">
        <table class="admin-table" id="events-table">
          <thead>
            <tr>
              <th>Title</th>
              <th>Date</th>
              <th>Time</th>
              <th>Venue</th>
              <th>Type</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="events-tbody"></tbody>
        </table>
      </div>
    </section>

    <!-- ══ CONTACTS ══ -->
    <section class="section" id="section-contacts">
      <div class="section-header-row">
        <h2 class="section-title">Manage Contacts</h2>
        <button class="btn-add" id="btn-add-contact">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Add Contact
        </button>
      </div>
      <div class="admin-table-wrap">
        <table class="admin-table" id="contacts-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Department</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Room</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="contacts-tbody"></tbody>
        </table>
      </div>
    </section>

  </main>

  <!-- ══ MODAL OVERLAY ══ -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 id="modal-title">Edit Event</h3>
        <button class="modal-close" id="modal-close">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <form id="modal-form"></form>
      <div class="modal-footer">
        <button class="btn-cancel" id="modal-cancel">Cancel</button>
        <button class="btn-save" id="modal-save">Save Changes</button>
      </div>
    </div>
  </div>

  <!-- ══ TOAST ══ -->
  <div class="toast" id="toast"></div>

  <!-- Scripts -->
  <script src="../js/data.js"></script>
  <script src="../js/storage.js"></script>
  <script src="admin.js"></script>

</body>
</html>
